[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm install --omit=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
PORT = "20128"
HOSTNAME = "0.0.0.0"
NEXT_TELEMETRY_DISABLED = "1"
NEXT_DIST_DIR = ".next"
